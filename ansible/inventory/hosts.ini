# Replace the IP values below with the Terraform outputs:
#   web_server_public_ip  → [webservers] host
#   db_server_private_ip  → [dbservers] host
#
# Run: terraform -chdir=../terraform output -raw web_server_public_ip
#      terraform -chdir=../terraform output -raw db_server_private_ip

[webservers]
web ansible_host=WEB_SERVER_PUBLIC_IP ansible_user=ubuntu

[dbservers]
db  ansible_host=DB_SERVER_PRIVATE_IP ansible_user=ubuntu ansible_ssh_common_args='-o ProxyJump=ubuntu@WEB_SERVER_PUBLIC_IP'

[all:vars]
ansible_python_interpreter=/usr/bin/python3
